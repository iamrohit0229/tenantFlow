version: '3.8'

services:

  # ─────────────────────────────────────────────
  # PostgreSQL — Tenant Service
  # ─────────────────────────────────────────────
  tenant-db:
    image: postgres:15-alpine
    container_name: tenantflow-tenant-db
    environment:
      POSTGRES_DB: tenant_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - tenant-db-data:/var/lib/postgresql/data
    networks:
      - tenantflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # PostgreSQL — Identity Service
  # ─────────────────────────────────────────────
  identity-db:
    image: postgres:15-alpine
    container_name: tenantflow-identity-db
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    networks:
      - tenantflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # PostgreSQL — Billing Service
  # ─────────────────────────────────────────────
  billing-db:
    image: postgres:15-alpine
    container_name: tenantflow-billing-db
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - billing-db-data:/var/lib/postgresql/data
    networks:
      - tenantflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MongoDB — Audit Service
  # ─────────────────────────────────────────────
  audit-mongodb:
    image: mongo:7.0
    container_name: tenantflow-audit-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: audit_db
    ports:
      - "27017:27017"
    volumes:
      - audit-mongodb-data:/data/db
    networks:
      - tenantflow-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis — Caching + Rate Limiting
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tenantflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tenantflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Zookeeper — Required by Kafka
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: tenantflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - tenantflow-network

  # ─────────────────────────────────────────────
  # Apache Kafka — Event Streaming
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tenantflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    networks:
      - tenantflow-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # Kafka UI — Visual Kafka Management
  # (Bonus: See messages, topics visually)
  # ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tenantflow-kafka-ui
    depends_on:
      - kafka
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tenantflow-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - tenantflow-network

  # ─────────────────────────────────────────────
  # Application Services
  # Added progressively week by week
  # ─────────────────────────────────────────────

  # eureka-server:    ← Week 4
  # config-server:    ← Week 4
  # api-gateway:      ← Week 4
  # tenant-service:   ← Week 2-3
  # identity-service: ← Week 3
  # billing-service:  ← Week 3-4
  # audit-service:    ← Week 5

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  tenant-db-data:
  identity-db-data:
  billing-db-data:
  audit-mongodb-data:
  redis-data:

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  nexusgate-network:
    driver: bridge

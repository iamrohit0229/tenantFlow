services:

  tenant-db:
    image: postgres:15-alpine
    container_name: tenantflow-tenant-db
    environment:
      POSTGRES_DB: tenant_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - tenant-db-data:/var/lib/postgresql/data
    networks:
      - tenantflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d tenant_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-db:
    image: postgres:15-alpine
    container_name: tenantflow-identity-db
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    networks:
      - tenantflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d identity_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  billing-db:
    image: postgres:15-alpine
    container_name: tenantflow-billing-db
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - billing-db-data:/var/lib/postgresql/data
    networks:
      - tenantflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d billing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  audit-mongodb:
    image: mongo:7.0
    container_name: tenantflow-audit-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: audit_db
    ports:
      - "27017:27017"
    volumes:
      - audit-mongodb-data:/data/db
    networks:
      - tenantflow-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tenantflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tenantflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: tenantflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - tenantflow-network
#    healthcheck:
#      test: ["CMD-SHELL", "echo ruok | timeout 2 nc -w 2 localhost 2181 | exit 1"]
#      interval: 10s
#      timeout: 10s
#      retries: 10
#      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tenantflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    networks:
      - tenantflow-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tenantflow-kafka-ui
    depends_on:
      - kafka
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tenantflow-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - tenantflow-network

volumes:
  tenant-db-data:
  identity-db-data:
  billing-db-data:
  audit-mongodb-data:
  redis-data:

networks:
  tenantflow-network:
    driver: bridge
